      <stop stop-color="#5eead4"/>
      <stop offset="0.55" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="ring" x1="32" y1="12" x2="32" y2="52" gradientUnits="userSpaceOnUse">
