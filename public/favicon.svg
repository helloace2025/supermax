  <path
    d="M22 18.5h10.2c5.1 0 8.5 2.7 8.5 7.1 0 3.4-1.9 5.7-5 6.7l5.8 9.7h-5.3l-5.2-9H26.8v9H22V18.5zm4.8 4v6.4h5c2.4 0 3.9-1.1 3.9-3.2S34.2 22.5 31.8 22.5H26.8z"
