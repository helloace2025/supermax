<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="RH Monitor">
  <defs>
    <linearGradient id="g" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4"/>
      <stop offset="0.45" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="ring" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App tile -->
  <rect width="64" height="64" rx="14" fill="#0B1220"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="url(#g)" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Radar rings -->
  <g fill="none" stroke="url(#ring)" stroke-linecap="round" filter="url(#glow)">
    <circle cx="32" cy="34" r="18" stroke-width="1.4" opacity="0.35"/>
    <circle cx="32" cy="34" r="12" stroke-width="1.6" opacity="0.55"/>
    <circle cx="32" cy="34" r="6" stroke-width="1.8" opacity="0.85"/>
  </g>

  <!-- Sweep wedge -->
  <path d="M32 34 L32 16 A18 18 0 0 1 47.5 25 Z" fill="url(#g)" opacity="0.28"/>
  <path d="M32 34 L32 16" stroke="url(#g)" stroke-width="2" stroke-linecap="round"/>

  <!-- Core pulse -->
  <circle cx="32" cy="34" r="3.2" fill="url(#g)"/>
  <circle cx="32" cy="34" r="1.4" fill="#F8FFFE"/>

  <!-- Hot mint blip -->
  <circle cx="44" cy="24" r="2.4" fill="#FB7185"/>
  <circle cx="44" cy="24" r="4" fill="#FB7185" opacity="0.25"/>
</svg>
