<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROBIN NFT Radar · Robinhood Chain</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/brand/logo-mark.svg" />
    <meta name="theme-color" content="#0B1220" id="metaThemeColor" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("mint-radar-theme");
          if (t !== "light" && t !== "dark") t = "dark";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="/mint.css?v=36" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <header class="top">
      <div class="brand">
        <img class="logo" src="/brand/logo-mark.svg" width="48" height="48" alt="ROBIN NFT Radar" />
        <div>
          <h1 data-i18n="brandTitle">ROBIN NFT Radar</h1>
          <p class="sub">
            <span data-i18n="brandSub">Robinhood Chain · 实时铸造热度</span>
            <a id="explorerLink" href="https://robinhoodchain.blockscout.com/" target="_blank" rel="noopener"
              >Blockscout ↗</a
            >
          </p>
        </div>
      </div>
      <div class="top-actions">
        <nav class="top-links" aria-label="Social">
          <!-- 换成你的真实账号链接即可 -->
          <a
            class="top-link"
            href="https://x.com/InstantSta53355"
            target="_blank"
            rel="noopener noreferrer"
            >Twitter</a
          >
          <span class="top-link-sep" aria-hidden="true">·</span>
          <a
            class="top-link"
            href="https://t.me/"
            target="_blank"
            rel="noopener noreferrer"
            >Telegram</a
          >
        </nav>
        <button
          type="button"
          class="toggle-btn"
          id="themeToggle"
          aria-label="Toggle theme"
          title="Click to switch Light / Dark"
        >
          Dark
        </button>
        <button
          type="button"
          class="toggle-btn"
          id="langToggle"
          aria-label="Toggle language"
          title="Click to switch 中文 / EN"
        >
          中文
        </button>
        <div class="wallet-wrap">
          <button type="button" class="wallet-btn" id="btnWallet" title="Connect Wallet">
            Connect Wallet
          </button>
          <div class="wallet-menu" id="walletMenu" hidden>
            <button type="button" class="wallet-menu-item" id="btnDisconnect" data-i18n="walletDisconnect">
              退出钱包
            </button>
          </div>
        </div>
      </div>
    </header>

    <section class="controls">
      <div class="controls-right">
        <div class="fav-wrap">
          <button type="button" class="btn btn-muted" id="btnFavorites" data-i18n="favBtn">
            已收藏 · 0
          </button>
        </div>
        <div class="blocked-wrap">
          <button type="button" class="btn btn-muted" id="btnBlocked" data-i18n="blockedBtn">
            已屏蔽 · 0
          </button>
        </div>
        <button type="button" class="btn" id="btnRefresh" data-i18n="refresh">立即刷新</button>
      </div>
    </section>

    <main class="layout">
      <section class="panel hot-panel">
        <div class="panel-head">
          <h2 data-i18n="hotTitle">🔥 铸造热榜</h2>
        </div>
        <div class="table-wrap hide-scrollbar">
          <table>
            <!-- col widths: only 集合 flexes; metrics shrink-wrap (see mint.css) -->
            <colgroup>
              <col class="c-rank" />
              <col class="c-name" />
              <col class="c-m5" />
              <col class="c-m30" />
              <col class="c-m1h" />
              <col class="c-price" />
              <col class="c-holders" />
              <col class="c-minted" />
              <col class="c-recent" />
            </colgroup>
            <thead>
              <tr>
                <th>#</th>
                <th data-i18n="thCollection">集合</th>
                <th data-i18n="th5m">5 分钟</th>
                <th data-i18n="th30m">30 分钟</th>
                <th data-i18n="th1h">1 小时</th>
                <th class="th-price">
                  <div class="th-price-inner">
                    <span data-i18n="thPrice">价格</span>
                    <button
                      type="button"
                      class="price-filter-trigger"
                      id="btnPriceFilter"
                      aria-haspopup="menu"
                      aria-expanded="false"
                      aria-controls="priceFilterMenu"
                      title="Filter"
                    >
                      <svg class="price-filter-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path
                          fill="currentColor"
                          d="M3 5.25A.75.75 0 0 1 3.75 4.5h16.5a.75.75 0 0 1 .53 1.28l-6.03 6.03v5.44a.75.75 0 0 1-1.13.65l-3-1.8a.75.75 0 0 1-.37-.65v-3.64L3.22 5.78A.75.75 0 0 1 3 5.25z"
                        />
                      </svg>
                    </button>
                    <div class="price-filter-menu" id="priceFilterMenu" role="menu" hidden>
                      <button type="button" class="price-filter-opt" role="menuitemradio" data-price-filter="all" data-i18n="priceFilterAll">
                        全部
                      </button>
                      <button type="button" class="price-filter-opt" role="menuitemradio" data-price-filter="free" data-i18n="priceFilterFree">
                        免费
                      </button>
                      <button type="button" class="price-filter-opt" role="menuitemradio" data-price-filter="paid" data-i18n="priceFilterPaid">
                        付费
                      </button>
                    </div>
                  </div>
                </th>
                <th data-i18n="thHolders">Holders</th>
                <th data-i18n="thMinted">已铸造</th>
                <th data-i18n="thRecent">最近</th>
              </tr>
            </thead>
            <tbody id="hotBody">
              <tr>
                <td colspan="9" class="empty" data-i18n="hotLoading">正在拉取链上 mint…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <div class="right-col">
        <section class="panel feed-panel">
          <div class="panel-head">
            <h2 data-i18n="feedTitle">⚡ 实时铸造流</h2>
            <span class="hint" data-i18n="feedHint">from 0x0 · ERC-721</span>
          </div>
          <div class="feed hide-scrollbar" id="feed"></div>
        </section>

        <section class="panel out-panel">
          <div class="panel-head">
            <h2 data-i18n="outTitle">🏁 已铸完</h2>
            <span class="hint" data-i18n="outHint">MINT OUT · 仍可跟进</span>
          </div>
          <div class="feed hide-scrollbar" id="mintedOut"></div>
        </section>
      </div>
    </main>

    <!-- status kept off-DOM-visible for JS only -->
    <span id="statusLine" hidden data-i18n="statusWaiting">等待数据…</span>

    <!-- Teleported to body top layer — must not sit under .panel stacking -->
    <div class="blocked-panel" id="favoritesPanel" hidden>
      <div class="blocked-panel-head">
        <span data-i18n="favTitle">收藏列表</span>
        <button type="button" class="blocked-clear" id="btnClearFavorites" data-i18n="favClear">
          全部取消
        </button>
      </div>
      <ul class="blocked-list" id="favoritesList"></ul>
      <p class="blocked-empty" id="favoritesEmpty" data-i18n="favEmpty">暂无收藏</p>
    </div>

    <div class="blocked-panel" id="blockedPanel" hidden>
      <div class="blocked-panel-head">
        <span data-i18n="blockedTitle">屏蔽列表</span>
        <button type="button" class="blocked-clear" id="btnClearBlocked" data-i18n="blockedClear">
          全部取消
        </button>
      </div>
      <ul class="blocked-list" id="blockedList"></ul>
      <p class="blocked-empty" id="blockedEmpty" data-i18n="blockedEmpty">暂无屏蔽</p>
    </div>

    <script src="/mint.js?v=39"></script>
  </body>
</html>
