# Railway deploy — https://docs.railway.com
# After first green deploy: Settings → Networking → Generate Domain
# (screenshot "Unexposed service" = no public domain yet)

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
# Temporarily no healthcheck gate — app exposes /api/health for manual checks.
# Re-enable after domain is generated if desired:
# healthcheckPath = "/api/health"
# healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
